<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Traffic Racer 3D</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <!-- Credits coin icon (referenced via <use> wherever currency is shown) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="credGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#fff6cf" />
        <stop offset="0.5" stop-color="#ffd166" />
        <stop offset="1" stop-color="#d99b2e" />
      </linearGradient>
      <g id="cred-coin">
        <circle cx="12" cy="12" r="10" fill="url(#credGrad)" stroke="#b9802a" stroke-width="1" />
        <circle cx="12" cy="12" r="7" fill="none" stroke="#fff2c2" stroke-width="1.1" opacity="0.85" />
        <path d="M12 7.2l1.25 2.95 3.2.27-2.43 2.1.74 3.13L12 16.1l-2.75 1.65.74-3.13-2.43-2.1 3.2-.27z" fill="#fff7d6" opacity="0.9" />
      </g>
    </defs>
  </svg>

  <div id="game-wrapper">
    <canvas id="game" width="960" height="540"></canvas>
    <canvas id="fx" class="fx"></canvas>

    <!-- Populated at runtime by showMenu() -->
    <div id="overlay" class="overlay"></div>

    <div id="garage" class="overlay hidden"></div>

    <div id="results" class="overlay hidden"></div>

    <div id="hud">
      <div class="hud-left">
        <div class="hud-score"><span class="hud-label">SCORE</span><span id="score">0</span></div>
        <div class="hud-dist"><span id="dist">0.0</span> km</div>
      </div>
      <div id="combo">
        <span id="combo-mult">x2</span>
        <div class="combo-bar"><i id="combo-fill"></i></div>
      </div>
      <div class="hud-right">
        <div class="spd-row"><span id="speed">0</span><span class="spd-unit">km/h</span></div>
        <div class="spd-meter"><i id="spd-fill"></i></div>
      </div>
    </div>

    <!-- Names the biome as you cross into it (set by the biome engine) -->
    <div id="biome"></div>

    <button id="mute" aria-label="Toggle sound">🔊</button>

    <!-- Analog joystick (mobile): push up to accelerate, left/right to steer, down to brake -->
    <div id="joystick" class="joystick">
      <div id="stick" class="stick"></div>
    </div>
  </div>

  <!-- Shown on mobile when held in portrait -->
  <div id="rotate">
    <div class="rotate-icon">&#128241;</div>
    <h2>Rotate your device</h2>
    <p>This game is played in landscape.</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js?v=2"></script>
</body>
</html>
