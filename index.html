<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Traffic Racer 3D</title>
  <link rel="icon" href="data:," /> <!-- empty icon: stops the browser's /favicon.ico 404 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=15" />
</head>
<body>
  <!-- Credits coin icon (referenced via <use> wherever currency is shown) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="credGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#fff6cf" />
        <stop offset="0.5" stop-color="#ffd166" />
        <stop offset="1" stop-color="#d99b2e" />
      </linearGradient>
      <g id="cred-coin">
        <circle cx="12" cy="12" r="10" fill="url(#credGrad)" stroke="#b9802a" stroke-width="1" />
        <circle cx="12" cy="12" r="7" fill="none" stroke="#fff2c2" stroke-width="1.1" opacity="0.85" />
        <path d="M12 7.2l1.25 2.95 3.2.27-2.43 2.1.74 3.13L12 16.1l-2.75 1.65.74-3.13-2.43-2.1 3.2-.27z" fill="#fff7d6" opacity="0.9" />
      </g>
      <!-- Thin-line UI icons; drawn with currentColor so they inherit text color -->
      <g id="ico-trophy" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 4h10v5a5 5 0 0 1-10 0V4z" /><path d="M7 6H4v1a3 3 0 0 0 3 3" /><path d="M17 6h3v1a3 3 0 0 1-3 3" /><path d="M9.5 19h5" /><path d="M12 14v5" />
      </g>
      <g id="ico-car" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 13l2.2-5.2A3 3 0 0 1 8 6h8a3 3 0 0 1 2.8 1.8L21 13" /><path d="M3 13h18v4a1 1 0 0 1-1 1h-1.5M6.5 18H4a1 1 0 0 1-1-1v-4" /><circle cx="7.5" cy="17.5" r="1.6" /><circle cx="16.5" cy="17.5" r="1.6" />
      </g>
      <g id="ico-lock" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="9" rx="2" /><path d="M8 11V8a4 4 0 0 1 8 0v3" />
      </g>
      <g id="ico-sun" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
      </g>
      <g id="ico-moon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.8A8 8 0 1 1 11.2 3a6 6 0 0 0 9.8 9.8z" />
      </g>
      <g id="ico-vol-on" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9.5v5h3l5 4v-13l-5 4H4z" /><path d="M16 9.5a3.5 3.5 0 0 1 0 5M18.5 7a7 7 0 0 1 0 10" />
      </g>
      <g id="ico-vol-off" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9.5v5h3l5 4v-13l-5 4H4z" /><path d="M16.5 9.5l5 5M21.5 9.5l-5 5" />
      </g>
      <!-- Environment diorama glyphs (larger, decorative) -->
      <g id="ico-leaf" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20C4 11 11 4 20 4c0 9-7 16-16 16z" /><path d="M9 15c2.5-3 5.5-4.5 9-5.5" />
      </g>
      <g id="ico-cactus" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21V6" /><path d="M12 14H9.5A2.5 2.5 0 0 1 7 11.5V10" /><path d="M12 12h2.5A2.5 2.5 0 0 0 17 9.5V8.5" /><path d="M9 21h6" />
      </g>
      <g id="ico-building" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="3" width="12" height="18" rx="1" /><path d="M9.5 7h1.5M13 7h1.5M9.5 11h1.5M13 11h1.5M9.5 15h1.5M13 15h1.5" />
      </g>
      <g id="ico-spark" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 3l1.9 4.6L17.5 9.5l-4.6 1.9L11 16l-1.9-4.6L4.5 9.5l4.6-1.9z" /><path d="M18 14l.9 2.4 2.4.9-2.4.9-.9 2.4-.9-2.4-2.4-.9 2.4-.9z" />
      </g>
      <g id="ico-pause" fill="currentColor"><rect x="6.5" y="5" width="3.5" height="14" rx="1" /><rect x="14" y="5" width="3.5" height="14" rx="1" /></g>
      <g id="ico-check" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5 10-11" /></g>
    </defs>
  </svg>

  <div id="game-wrapper">
    <canvas id="game" width="960" height="540"></canvas>
    <canvas id="fx" class="fx"></canvas>

    <!-- Populated at runtime by showMenu() -->
    <div id="overlay" class="overlay"></div>

    <div id="garage" class="overlay hidden"></div>

    <div id="environments" class="overlay hidden"></div>

    <div id="results" class="overlay hidden"></div>

    <div id="pause" class="overlay hidden"></div>

    <div id="hud">
      <div class="hud-left">
        <div class="hud-score"><span class="hud-label">SCORE</span><span id="score">0</span></div>
        <div class="hud-dist"><span id="dist">0.0</span> km</div>
      </div>
      <div id="combo">
        <span id="combo-mult">x2</span>
        <div class="combo-bar"><i id="combo-fill"></i></div>
      </div>
      <div class="hud-right">
        <div class="spd-row"><span id="speed">0</span><span class="spd-unit">km/h</span></div>
        <div class="spd-meter"><i id="spd-fill"></i></div>
      </div>
    </div>

    <!-- Names the biome as you cross into it (set by the biome engine) -->
    <div id="biome"></div>

    <!-- Transient notifications (e.g. a daily goal completing mid-run) -->
    <div id="toasts"></div>

    <button id="mute" aria-label="Toggle sound"></button>
    <button id="pause-btn" aria-label="Pause"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><use href="#ico-pause"/></svg></button>

    <!-- Touch driving controls (mobile): hold to steer / accelerate / brake -->
    <div id="touch-controls">
      <div class="tc-left">
        <button id="btn-left" class="tc-btn" aria-label="Steer left">◀</button>
        <button id="btn-right" class="tc-btn" aria-label="Steer right">▶</button>
      </div>
      <div class="tc-right">
        <button id="btn-brake" class="tc-btn tc-brake" aria-label="Brake">BRAKE</button>
        <button id="btn-gas" class="tc-btn tc-gas" aria-label="Accelerate">GAS</button>
      </div>
    </div>
  </div>

  <!-- Shown on mobile when held in portrait -->
  <div id="rotate">
    <div class="rotate-icon">&#128241;</div>
    <h2>Rotate your device</h2>
    <p>This game is played in landscape.</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js?v=20"></script>
</body>
</html>
